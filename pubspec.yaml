name: skwirlsai
description: SkwirlsAI - Cross-platform local LLM assistant with Google Workspace integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # LLM Runtime
  llama_cpp_dart: ^0.2.2

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Google OAuth & APIs (no Firebase)
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  flutter_secure_storage: ^9.2.2

  # State Management
  flutter_riverpod: ^2.5.1

  # File & Storage
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^8.0.7
  shared_preferences: ^2.3.2

  # Media Input
  image_picker: ^1.1.2
  camera: ^0.11.0+2

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.0.5
  http: ^1.2.2

  # Device Info
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2

  # Background Tasks
  workmanager: ^0.5.2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.3+2

  # Utilities
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
